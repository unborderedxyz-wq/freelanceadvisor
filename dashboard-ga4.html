<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FreelanceAdvisor — Dashboard Funnel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login-screen h1{font-size:22px;color:#1a1a2e}
.login-screen p{color:#666;font-size:14px;max-width:400px;text-align:center}
.login-btn{background:#2c6fbb;color:#fff;border:none;padding:12px 32px;font-size:15px;border-radius:6px;cursor:pointer;font-weight:600}
.login-btn:hover{background:#1d5a9e}
.header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header select,.header button{background:#2c3e6b;color:#fff;border:1px solid #3d5280;padding:6px 12px;border-radius:4px;font-size:13px;cursor:pointer}
.header button.logout{background:#cc4a3a;border-color:#cc4a3a}
.header button.export-btn{background:#7c3aed;border-color:#7c3aed}
.header button.export-btn.copied{background:#2a8c4a;border-color:#2a8c4a}
.filter-active{background:#2a8c4a !important;border-color:#2a8c4a !important}
.container{max-width:1200px;margin:0 auto;padding:20px}
.filter-info{background:#e8f0fe;color:#2c6fbb;padding:8px 14px;border-radius:6px;margin-bottom:14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.filter-info .dot{width:8px;height:8px;border-radius:50%;background:#2a8c4a;display:inline-block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:700;color:#2c6fbb}
.kpi-value.green{color:#2a8c4a}
.kpi-value.red{color:#cc4a3a}
.kpi-sub{font-size:12px;color:#aaa;margin-top:2px}
.section{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
.section h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #eee}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f8f9fc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-blue{background:#e8f0fe;color:#2c6fbb}
.badge-green{background:#e6f4ea;color:#2a8c4a}
.badge-red{background:#fce8e6;color:#cc4a3a}
.badge-gray{background:#f0f0f0;color:#666}
.funnel-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:4px}
.funnel-fill{height:100%;background:#2c6fbb;border-radius:4px;transition:width .5s}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.error{background:#fce8e6;color:#cc4a3a;padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:13px}
.refresh-info{font-size:11px;color:#aaa;text-align:right;margin-bottom:10px}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.container{padding:12px}.kpi-value{font-size:22px}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div id="app">
  <div class="login-screen"><h1>FreelanceAdvisor — Dashboard</h1><p>Connectez-vous avec votre compte Google pour voir les données GA4 en temps réel.</p><button class="login-btn" onclick="handleLogin()">Se connecter avec Google</button></div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID='774978170378-u0igsu0vtdt28gj52uq31h5rst9pbamb.apps.googleusercontent.com';
const PROPERTY_ID='529385366';
const SCOPES='https://www.googleapis.com/auth/analytics.readonly';
const API_URL='https://analyticsdata.googleapis.com/v1beta/properties/'+PROPERTY_ID+':runReport';
let accessToken=null,tokenClient=null,currentPeriod='7',currentFilter='all';

function initTokenClient(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(r)=>{if(r.error)return;accessToken=r.access_token;showDashboard();fetchAllData()}})}
function handleLogin(){if(!tokenClient){setTimeout(()=>{initTokenClient();tokenClient.requestAccessToken()},500)}else{tokenClient.requestAccessToken()}}
function handleLogout(){if(accessToken){google.accounts.oauth2.revoke(accessToken);accessToken=null}document.getElementById('app').innerHTML='<div class="login-screen"><h1>FreelanceAdvisor — Dashboard</h1><p>Connectez-vous avec votre compte Google.</p><button class="login-btn" onclick="handleLogin()">Se connecter avec Google</button></div>'}
window.onload=function(){setTimeout(initTokenClient,1000)};

function getTrafficFilter(){
  if(currentFilter==='france')return{filter:{fieldName:'country',stringFilter:{matchType:'EXACT',value:'France'}}};
  if(currentFilter==='ads')return{andGroup:{expressions:[{filter:{fieldName:'sessionSource',stringFilter:{matchType:'EXACT',value:'google'}}},{filter:{fieldName:'sessionMedium',stringFilter:{matchType:'EXACT',value:'cpc'}}}]}};
  return null;
}
function mergeFilters(ef){const tf=getTrafficFilter();if(!tf&&!ef)return undefined;if(!tf)return ef;if(!ef)return tf;const ee=ef.andGroup?ef.andGroup.expressions:[ef];const te=tf.andGroup?tf.andGroup.expressions:[tf];return{andGroup:{expressions:[...ee,...te]}}}
function changeFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('filter-active'));document.getElementById('filter-'+f).classList.add('filter-active');const l=currentFilter==='france'?'<span class="dot"></span> Filtre actif : France uniquement':currentFilter==='ads'?'<span class="dot"></span> Filtre actif : Google Ads uniquement':'';document.getElementById('filter-info').innerHTML=l;document.getElementById('filter-info').style.display=l?'flex':'none';fetchAllData()}

async function exportForClaude(){
  const btn=document.getElementById('export-btn');btn.textContent='⏳ Collecte...';
  try{
    const allData={};
    for(const filter of['all','france','ads']){
      const saved=currentFilter;currentFilter=filter;
      const kpiData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'totalUsers'},{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],...(getTrafficFilter()?{dimensionFilter:getTrafficFilter()}:{})});
      const ctaF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};
      const ctaData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(ctaF)});
      const bkF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'booking_complete'}}};
      const bkData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(bkF)});
      const row=kpiData.rows?.[0]?.metricValues||[];
      const users=parseInt(row[0]?.value||0),sessions=parseInt(row[1]?.value||0),engaged=parseInt(row[3]?.value||0);
      const ctaClicks=parseInt(ctaData.rows?.[0]?.metricValues?.[0]?.value||0);
      const bookings=parseInt(bkData.rows?.[0]?.metricValues?.[0]?.value||0);
      const funnel={};
      for(const evt of['ranking_viewed','cta_click','booking_complete']){try{const ef={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:evt}}};const d=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(ef)});funnel[evt]=parseInt(d.rows?.[0]?.metricValues?.[0]?.value||0)}catch(e){funnel[evt]=0}}
      let pages=[];try{const pD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'pagePath'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:15,...(getTrafficFilter()?{dimensionFilter:getTrafficFilter()}:{})});pages=(pD.rows||[]).map(r=>({page:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value),engaged:parseInt(r.metricValues[1].value)}))}catch(e){}
      let niches=[];try{const nF={filter:{fieldName:'customEvent:page_niche',stringFilter:{matchType:'FULL_REGEXP',value:'.+'}}};const nD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:page_niche'}],metrics:[{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],dimensionFilter:mergeFilters(nF)});niches=(nD.rows||[]).map(r=>({niche:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value),events:parseInt(r.metricValues[1].value),engaged:parseInt(r.metricValues[2].value)}))}catch(e){}
      let ctaPos=[];try{const cF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};const cD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:click_position'}],metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cF)});ctaPos=(cD.rows||[]).map(r=>({position:r.dimensionValues[0].value,clicks:parseInt(r.metricValues[0].value)}))}catch(e){}
      allData[filter]={kpis:{users,sessions,engaged,ctaClicks,bookings},funnel:{visits:sessions,...funnel},pages,niches,ctaByPosition:ctaPos};
      currentFilter=saved;
    }
    const json=JSON.stringify({exportDate:new Date().toISOString(),period:currentPeriod+' jours',propertyId:PROPERTY_ID,filters:allData},null,2);
    await navigator.clipboard.writeText(json);
    btn.textContent='✅ Copié !';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 Copier pour Claude';btn.classList.remove('copied')},3000);
  }catch(err){btn.textContent='❌ Erreur';console.error(err);setTimeout(()=>{btn.textContent='📋 Copier pour Claude'},3000)}
}

function showDashboard(){document.getElementById('app').innerHTML=`<div class="header"><h1>FreelanceAdvisor — Funnel Dashboard</h1><div class="header-right"><select id="period-select" onchange="changePeriod(this.value)"><option value="1">Aujourd'hui</option><option value="7" selected>7 derniers jours</option><option value="14">14 derniers jours</option><option value="30">30 derniers jours</option><option value="90">90 derniers jours</option></select><button id="filter-all" class="filter-btn filter-active" onclick="changeFilter('all')">Tout le trafic</button><button id="filter-france" class="filter-btn" onclick="changeFilter('france')">France uniquement</button><button id="filter-ads" class="filter-btn" onclick="changeFilter('ads')">Google Ads uniquement</button><button onclick="fetchAllData()">Rafraîchir</button><button id="export-btn" class="export-btn" onclick="exportForClaude()">📋 Copier pour Claude</button><button class="logout" onclick="handleLogout()">Déconnexion</button></div></div><div class="container"><div class="refresh-info" id="refresh-info"></div><div class="filter-info" id="filter-info" style="display:none"></div><div id="error-box"></div><div class="kpi-row" id="kpi-row"><div class="kpi"><div class="kpi-label">Chargement...</div><div class="kpi-value">—</div></div></div><div class="section" id="funnel-section"><h2>Funnel de conversion</h2><div class="loading">Chargement...</div></div><div class="section" id="niche-section"><h2>Performance par niche</h2><div class="loading">Chargement...</div></div><div class="section" id="pages-section"><h2>Pages les plus visitées</h2><div class="loading">Chargement...</div></div><div class="section" id="clicks-section"><h2>Clics CTA par position</h2><div class="loading">Chargement...</div></div></div>`}
function changePeriod(d){currentPeriod=d;fetchAllData()}

async function ga4Report(body){const res=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok){const err=await res.json();throw new Error(err.error?.message||'API Error')}return res.json()}
function dateRange(){return currentPeriod==='1'?[{startDate:'today',endDate:'today'}]:[{startDate:currentPeriod+'daysAgo',endDate:'today'}]}
async function fetchAllData(){document.getElementById('refresh-info').textContent='Dernière mise à jour : '+new Date().toLocaleString('fr-FR');document.getElementById('error-box').innerHTML='';try{await Promise.all([fetchKPIs(),fetchFunnel(),fetchNiches(),fetchPages(),fetchClicks()])}catch(err){document.getElementById('error-box').innerHTML=`<div class="error">Erreur : ${err.message}</div>`}}

async function fetchKPIs(){const bf=getTrafficFilter();const data=await ga4Report({dateRanges:dateRange(),dimensions:currentFilter!=='all'?[{name:currentFilter==='france'?'country':'sessionSource'}]:[],metrics:[{name:'totalUsers'},{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],...(bf?{dimensionFilter:bf}:{})});const cf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};const ctaData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cf)});const bkf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'booking_complete'}}};const bkData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(bkf)});const row=data.rows?.[0]?.metricValues||[];const u=parseInt(row[0]?.value||0),s=parseInt(row[1]?.value||0),e=parseInt(row[3]?.value||0);const cc=parseInt(ctaData.rows?.[0]?.metricValues?.[0]?.value||0);const bk=parseInt(bkData.rows?.[0]?.metricValues?.[0]?.value||0);const er=s>0?((e/s)*100).toFixed(1):0;const cr=u>0?((cc/u)*100).toFixed(1):0;const br=cc>0?((bk/cc)*100).toFixed(1):0;document.getElementById('kpi-row').innerHTML=`<div class="kpi"><div class="kpi-label">Visiteurs</div><div class="kpi-value">${u}</div><div class="kpi-sub">${s} sessions</div></div><div class="kpi"><div class="kpi-label">Taux d'engagement</div><div class="kpi-value ${parseFloat(er)>50?'green':''}">${er}%</div><div class="kpi-sub">${e} sessions engagées</div></div><div class="kpi"><div class="kpi-label">Clics CTA</div><div class="kpi-value">${cc}</div><div class="kpi-sub">CTR : ${cr}%</div></div><div class="kpi"><div class="kpi-label">Bookings Calendly</div><div class="kpi-value green">${bk}</div><div class="kpi-sub">Taux : ${br}%</div></div>`}

async function fetchFunnel(){const events=['page_view','ranking_viewed','cta_click','booking_complete'];const results={};for(const evt of events){try{let ef=evt!=='page_view'?{filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:evt}}}:null;const c=mergeFilters(ef);const d=await ga4Report({dateRanges:dateRange(),metrics:[{name:evt==='page_view'?'sessions':'eventCount'}],...(c?{dimensionFilter:c}:{})});results[evt]=parseInt(d.rows?.[0]?.metricValues?.[0]?.value||0)}catch(e){results[evt]=0}}const t=results['page_view']||1;const steps=[{name:'Visites',count:results['page_view'],pct:100},{name:'Ranking vu',count:results['ranking_viewed'],pct:((results['ranking_viewed']/t)*100).toFixed(1)},{name:'Clic CTA',count:results['cta_click'],pct:((results['cta_click']/t)*100).toFixed(1)},{name:'Booking',count:results['booking_complete'],pct:((results['booking_complete']/t)*100).toFixed(1)}];let html='<table><tr><th>Étape</th><th>Nombre</th><th>% du total</th><th>Conversion</th><th></th></tr>';for(let i=0;i<steps.length;i++){const s=steps[i];const cr=i>0&&steps[i-1].count>0?((s.count/steps[i-1].count)*100).toFixed(1)+'%':'—';const bc=i===0?'badge-blue':parseFloat(s.pct)>10?'badge-green':parseFloat(s.pct)>0?'badge-blue':'badge-gray';html+=`<tr><td><strong>${s.name}</strong></td><td>${s.count}</td><td><span class="badge ${bc}">${s.pct}%</span></td><td>${cr}</td><td><div class="funnel-bar"><div class="funnel-fill" style="width:${s.pct}%"></div></div></td></tr>`}html+='</table>';document.getElementById('funnel-section').innerHTML='<h2>Funnel de conversion</h2>'+html}

async function fetchNiches(){try{const nf={filter:{fieldName:'customEvent:page_niche',stringFilter:{matchType:'FULL_REGEXP',value:'.+'}}};const d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:page_niche'}],metrics:[{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],dimensionFilter:mergeFilters(nf)});if(!d.rows||!d.rows.length){document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2><p style="color:#888;font-size:13px">Pas encore de données.</p>';return}let html='<table><tr><th>Niche</th><th>Sessions</th><th>Events</th><th>Engagement</th></tr>';for(const row of d.rows){const n=row.dimensionValues[0].value,s=parseInt(row.metricValues[0].value),e=parseInt(row.metricValues[1].value),eng=parseInt(row.metricValues[2].value);html+=`<tr><td><span class="badge badge-blue">${n}</span></td><td>${s}</td><td>${e}</td><td>${s>0?((eng/s)*100).toFixed(0):0}%</td></tr>`}html+='</table>';document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2>'+html}catch(e){document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2><p style="color:#888;font-size:13px">Données non disponibles.</p>'}}

async function fetchPages(){const bf=getTrafficFilter();const d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'pagePath'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:15,...(bf?{dimensionFilter:bf}:{})});if(!d.rows){document.getElementById('pages-section').innerHTML='<h2>Pages les plus visitées</h2><p style="color:#888;font-size:13px">Pas de données.</p>';return}let html='<table><tr><th>Page</th><th>Sessions</th><th>Engagées</th><th>Taux</th></tr>';for(const row of d.rows){const p=row.dimensionValues[0].value,s=parseInt(row.metricValues[0].value),e=parseInt(row.metricValues[1].value);html+=`<tr><td>${p} ${p.includes('comparatif')?'<span class="badge badge-green">funnel</span>':''}</td><td>${s}</td><td>${e}</td><td>${s>0?((e/s)*100).toFixed(0):0}%</td></tr>`}html+='</table>';document.getElementById('pages-section').innerHTML='<h2>Pages les plus visitées</h2>'+html}

async function fetchClicks(){try{const cf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};const d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:click_position'}],metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cf),orderBys:[{dimension:{dimensionName:'customEvent:click_position'},desc:false}]});if(!d.rows||!d.rows.length){document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2><p style="color:#888;font-size:13px">Pas encore de clics.</p>';return}const total=d.rows.reduce((s,r)=>s+parseInt(r.metricValues[0].value),0);let html='<table><tr><th>Position</th><th>Clics</th><th>% du total</th><th></th></tr>';for(const row of d.rows){const pos=row.dimensionValues[0].value,clicks=parseInt(row.metricValues[0].value),pct=total>0?((clicks/total)*100).toFixed(0):0;html+=`<tr><td><span class="badge ${pos==='1'?'badge-green':'badge-gray'}">Position ${pos}</span></td><td><strong>${clicks}</strong></td><td>${pct}%</td><td><div class="funnel-bar"><div class="funnel-fill" style="width:${pct}%;background:${pos==='1'?'#2a8c4a':'#2c6fbb'}"></div></div></td></tr>`}html+=`<tr style="font-weight:600;border-top:2px solid #ddd"><td>Total</td><td>${total}</td><td>100%</td><td></td></tr></table>`;document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2>'+html}catch(e){document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2><p style="color:#888;font-size:13px">Données non disponibles.</p>'}}
</script>
</body>
</html>
