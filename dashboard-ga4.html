<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FreelanceAdvisor — Dashboard Funnel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login-screen h1{font-size:22px;color:#1a1a2e}
.login-screen p{color:#666;font-size:14px;max-width:400px;text-align:center}
.login-btn{background:#2c6fbb;color:#fff;border:none;padding:12px 32px;font-size:15px;border-radius:6px;cursor:pointer;font-weight:600}
.login-btn:hover{background:#1d5a9e}
.header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header select,.header button{background:#2c3e6b;color:#fff;border:1px solid #3d5280;padding:6px 12px;border-radius:4px;font-size:13px;cursor:pointer}
.header button.logout{background:#cc4a3a;border-color:#cc4a3a}
.header button.export-btn{background:#7c3aed;border-color:#7c3aed}
.header button.export-btn.copied{background:#2a8c4a;border-color:#2a8c4a}
.filter-active{background:#2a8c4a !important;border-color:#2a8c4a !important}
.container{max-width:1200px;margin:0 auto;padding:20px}
.filter-info{background:#e8f0fe;color:#2c6fbb;padding:8px 14px;border-radius:6px;margin-bottom:14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.filter-info .dot{width:8px;height:8px;border-radius:50%;background:#2a8c4a;display:inline-block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:700;color:#2c6fbb}
.kpi-value.green{color:#2a8c4a}
.kpi-value.red{color:#cc4a3a}
.kpi-sub{font-size:12px;color:#aaa;margin-top:2px}
.section{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
.section h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #eee}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f8f9fc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-blue{background:#e8f0fe;color:#2c6fbb}
.badge-green{background:#e6f4ea;color:#2a8c4a}
.badge-red{background:#fce8e6;color:#cc4a3a}
.badge-orange{background:#fef3e2;color:#c07b20}
.badge-gray{background:#f0f0f0;color:#666}
.funnel-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:4px}
.funnel-fill{height:100%;background:#2c6fbb;border-radius:4px;transition:width .5s}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.error{background:#fce8e6;color:#cc4a3a;padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:13px}
.refresh-info{font-size:11px;color:#aaa;text-align:right;margin-bottom:10px}
.query-warning{color:#cc4a3a;font-size:11px;font-weight:600}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.container{padding:12px}.kpi-value{font-size:22px}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div id="app">
  <div class="login-screen"><h1>FreelanceAdvisor — Dashboard</h1><p>Connectez-vous avec votre compte Google pour voir les données GA4 en temps réel.</p><button class="login-btn" onclick="handleLogin()">Se connecter avec Google</button></div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID='774978170378-u0igsu0vtdt28gj52uq31h5rst9pbamb.apps.googleusercontent.com';
const PROPERTY_ID='529385366';
const SCOPES='https://www.googleapis.com/auth/analytics.readonly';
const API_URL='https://analyticsdata.googleapis.com/v1beta/properties/'+PROPERTY_ID+':runReport';
let accessToken=null,tokenClient=null,currentPeriod='7',currentFilter='all';
const NEGATIVE_KEYWORDS=['gratuit','formation','emploi','cdi','salaire','tuto','tutoriel','cours','apprendre','stage','recrutement','embauche','définition','wikipedia'];

function initTokenClient(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(r)=>{if(r.error)return;accessToken=r.access_token;showDashboard();fetchAllData()}})}
function handleLogin(){if(!tokenClient){setTimeout(()=>{initTokenClient();tokenClient.requestAccessToken()},500)}else{tokenClient.requestAccessToken()}}
function handleLogout(){if(accessToken){google.accounts.oauth2.revoke(accessToken);accessToken=null}document.getElementById('app').innerHTML='<div class="login-screen"><h1>FreelanceAdvisor — Dashboard</h1><p>Connectez-vous avec votre compte Google.</p><button class="login-btn" onclick="handleLogin()">Se connecter avec Google</button></div>'}
window.onload=function(){setTimeout(initTokenClient,1000)};

function getTrafficFilter(){
  if(currentFilter==='france')return{filter:{fieldName:'country',stringFilter:{matchType:'EXACT',value:'France'}}};
  if(currentFilter==='ads')return{andGroup:{expressions:[{filter:{fieldName:'sessionSource',stringFilter:{matchType:'EXACT',value:'google'}}},{filter:{fieldName:'sessionMedium',stringFilter:{matchType:'EXACT',value:'cpc'}}}]}};
  return null;
}
function mergeFilters(ef){const tf=getTrafficFilter();if(!tf&&!ef)return undefined;if(!tf)return ef;if(!ef)return tf;const ee=ef.andGroup?ef.andGroup.expressions:[ef];const te=tf.andGroup?tf.andGroup.expressions:[tf];return{andGroup:{expressions:[...ee,...te]}}}
function changeFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('filter-active'));document.getElementById('filter-'+f).classList.add('filter-active');const l=currentFilter==='france'?'<span class="dot"></span> Filtre actif : France uniquement':currentFilter==='ads'?'<span class="dot"></span> Filtre actif : Google Ads uniquement':'';document.getElementById('filter-info').innerHTML=l;document.getElementById('filter-info').style.display=l?'flex':'none';fetchAllData()}
function isNegativeQuery(query){const q=query.toLowerCase();return NEGATIVE_KEYWORDS.some(nk=>q.includes(nk))}

async function fetchSearchQueries(){
  try{
    const adsFilter={andGroup:{expressions:[{filter:{fieldName:'sessionSource',stringFilter:{matchType:'EXACT',value:'google'}}},{filter:{fieldName:'sessionMedium',stringFilter:{matchType:'EXACT',value:'cpc'}}}]}};
    const d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'sessionGoogleAdsQuery'},{name:'landingPage'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],dimensionFilter:adsFilter,orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:50});
    if(!d.rows||!d.rows.length){document.getElementById('search-section').innerHTML='<h2>🔍 Termes de recherche Google Ads</h2><p style="color:#888;font-size:13px">Pas encore de données.</p>';return}
    let html='<table><tr><th>Terme recherché</th><th>Page d\'arrivée</th><th>Sessions</th><th>Engagées</th><th>Taux</th><th>Statut</th></tr>';
    for(const row of d.rows){const query=row.dimensionValues[0].value;const landing=row.dimensionValues[1].value;const sessions=parseInt(row.metricValues[0].value);const engaged=parseInt(row.metricValues[1].value);const rate=sessions>0?((engaged/sessions)*100).toFixed(0):0;const isNeg=isNegativeQuery(query);const isNotSet=query==='(not set)'||query==='';let statusBadge='';if(isNotSet){statusBadge='<span class="badge badge-gray">non disponible</span>'}else if(isNeg){statusBadge='<span class="badge badge-red">⚠️ à exclure</span>'}else if(parseInt(rate)<30){statusBadge='<span class="badge badge-orange">faible engagement</span>'}else{statusBadge='<span class="badge badge-green">✓ pertinent</span>'}const rowStyle=isNeg?'style="background:#fef0f0"':'';html+='<tr '+rowStyle+'><td><strong>'+query+'</strong>'+(isNeg?' <span class="query-warning">← mot-clé négatif détecté</span>':'')+'</td><td>'+(landing.includes('comparatif')?'<span class="badge badge-green">'+landing+'</span>':landing)+'</td><td>'+sessions+'</td><td>'+engaged+'</td><td>'+rate+'%</td><td>'+statusBadge+'</td></tr>'}
    html+='</table>';document.getElementById('search-section').innerHTML='<h2>🔍 Termes de recherche Google Ads</h2>'+html;
  }catch(e){document.getElementById('search-section').innerHTML='<h2>🔍 Termes de recherche Google Ads</h2><p style="color:#888;font-size:13px">Dimension sessionGoogleAdsQuery non disponible.</p>'}
}

async function fetchSearchQueriesForExport(){
  try{
    const adsFilter={andGroup:{expressions:[{filter:{fieldName:'sessionSource',stringFilter:{matchType:'EXACT',value:'google'}}},{filter:{fieldName:'sessionMedium',stringFilter:{matchType:'EXACT',value:'cpc'}}}]}};
    const d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'sessionGoogleAdsQuery'},{name:'landingPage'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],dimensionFilter:adsFilter,orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:50});
    return (d.rows||[]).map(r=>({query:r.dimensionValues[0].value,landingPage:r.dimensionValues[1].value,sessions:parseInt(r.metricValues[0].value),engaged:parseInt(r.metricValues[1].value),isNegative:isNegativeQuery(r.dimensionValues[0].value)}));
  }catch(e){return []}
}

// ─── COPY TO CLIPBOARD WITH FALLBACK ───
async function copyToClipboard(text){
  try{await navigator.clipboard.writeText(text);return true}catch(e){
    try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);if(ok)return true}catch(e2){}
    showCopyModal(text);return false;
  }
}
function showCopyModal(text){
  const overlay=document.createElement('div');overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  const modal=document.createElement('div');modal.style.cssText='background:#fff;border-radius:10px;padding:24px;max-width:700px;width:90%;max-height:80vh;display:flex;flex-direction:column;gap:12px';
  modal.innerHTML='<h3 style="margin:0;font-size:16px">Copier les données pour Claude</h3><p style="margin:0;font-size:13px;color:#666">Sélectionnez tout (Cmd+A ou Ctrl+A) puis copiez (Cmd+C ou Ctrl+C) :</p>';
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='width:100%;height:300px;font-family:monospace;font-size:11px;border:1px solid #ddd;border-radius:6px;padding:10px;resize:vertical';ta.readOnly=true;
  const closeBtn=document.createElement('button');closeBtn.textContent='Fermer';closeBtn.style.cssText='background:#2c6fbb;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;align-self:flex-end';
  closeBtn.onclick=function(){document.body.removeChild(overlay)};
  modal.appendChild(ta);modal.appendChild(closeBtn);overlay.appendChild(modal);document.body.appendChild(overlay);ta.focus();ta.select();
}

// ─── EXPORT FOR CLAUDE ───
async function exportForClaude(){
  var btn=document.getElementById('export-btn');btn.textContent='⏳ Collecte...';
  try{
    var allData={};
    for(var fi=0;fi<3;fi++){
      var filter=['all','france','ads'][fi];
      var saved=currentFilter;currentFilter=filter;
      var users=0,sessions=0,engaged=0,ctaClicks=0,bookings=0;
      try{var kD=await ga4Report({dateRanges:dateRange(),metrics:[{name:'totalUsers'},{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],...(getTrafficFilter()?{dimensionFilter:getTrafficFilter()}:{})});var row=kD.rows&&kD.rows[0]?kD.rows[0].metricValues:[];users=parseInt(row[0]?row[0].value:0);sessions=parseInt(row[1]?row[1].value:0);engaged=parseInt(row[3]?row[3].value:0)}catch(e){}
      try{var ctaF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};var ctaD=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(ctaF)});ctaClicks=parseInt(ctaD.rows&&ctaD.rows[0]?ctaD.rows[0].metricValues[0].value:0)}catch(e){}
      try{var bkF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'booking_complete'}}};var bkD=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(bkF)});bookings=parseInt(bkD.rows&&bkD.rows[0]?bkD.rows[0].metricValues[0].value:0)}catch(e){}
      var funnel={};var evts=['ranking_viewed','cta_click','booking_complete'];for(var ei=0;ei<evts.length;ei++){try{var ef={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:evts[ei]}}};var ed=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(ef)});funnel[evts[ei]]=parseInt(ed.rows&&ed.rows[0]?ed.rows[0].metricValues[0].value:0)}catch(e){funnel[evts[ei]]=0}}
      var pages=[];try{var pD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'pagePath'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:15,...(getTrafficFilter()?{dimensionFilter:getTrafficFilter()}:{})});pages=(pD.rows||[]).map(function(r){return{page:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value),engaged:parseInt(r.metricValues[1].value)}})}catch(e){}
      var niches=[];try{var nF={filter:{fieldName:'customEvent:page_niche',stringFilter:{matchType:'FULL_REGEXP',value:'.+'}}};var nD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:page_niche'}],metrics:[{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],dimensionFilter:mergeFilters(nF)});niches=(nD.rows||[]).map(function(r){return{niche:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value),events:parseInt(r.metricValues[1].value),engaged:parseInt(r.metricValues[2].value)}})}catch(e){}
      var ctaPos=[];try{var cF={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};var cD=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:click_position'}],metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cF)});ctaPos=(cD.rows||[]).map(function(r){return{position:r.dimensionValues[0].value,clicks:parseInt(r.metricValues[0].value)}})}catch(e){}
      allData[filter]={kpis:{users:users,sessions:sessions,engaged:engaged,ctaClicks:ctaClicks,bookings:bookings},funnel:{visits:sessions,ranking_viewed:funnel.ranking_viewed,cta_click:funnel.cta_click,booking_complete:funnel.booking_complete},pages:pages,niches:niches,ctaByPosition:ctaPos};
      currentFilter=saved;
    }
    var searchQueries=[];try{searchQueries=await fetchSearchQueriesForExport()}catch(e){}
    var json=JSON.stringify({exportDate:new Date().toISOString(),period:currentPeriod+' jours',propertyId:PROPERTY_ID,filters:allData,searchQueries:searchQueries},null,2);
    var copied=await copyToClipboard(json);
    if(copied){btn.textContent='✅ Copié !';btn.classList.add('copied');setTimeout(function(){btn.textContent='📋 Copier pour Claude';btn.classList.remove('copied')},3000)}else{btn.textContent='📋 Copier pour Claude'}
  }catch(err){console.error('Export error:',err);btn.textContent='❌ '+err.message;setTimeout(function(){btn.textContent='📋 Copier pour Claude'},5000)}
}

function showDashboard(){document.getElementById('app').innerHTML='<div class="header"><h1>FreelanceAdvisor — Funnel Dashboard</h1><div class="header-right"><select id="period-select" onchange="changePeriod(this.value)"><option value="1">Aujourd\'hui</option><option value="7" selected>7 derniers jours</option><option value="14">14 derniers jours</option><option value="30">30 derniers jours</option><option value="90">90 derniers jours</option></select><button id="filter-all" class="filter-btn filter-active" onclick="changeFilter(\'all\')">Tout le trafic</button><button id="filter-france" class="filter-btn" onclick="changeFilter(\'france\')">France uniquement</button><button id="filter-ads" class="filter-btn" onclick="changeFilter(\'ads\')">Google Ads uniquement</button><button onclick="fetchAllData()">Rafraîchir</button><button id="export-btn" class="export-btn" onclick="exportForClaude()">📋 Copier pour Claude</button><button class="logout" onclick="handleLogout()">Déconnexion</button></div></div><div class="container"><div class="refresh-info" id="refresh-info"></div><div class="filter-info" id="filter-info" style="display:none"></div><div id="error-box"></div><div class="kpi-row" id="kpi-row"><div class="kpi"><div class="kpi-label">Chargement...</div><div class="kpi-value">—</div></div></div><div class="section" id="funnel-section"><h2>Funnel de conversion</h2><div class="loading">Chargement...</div></div><div class="section" id="search-section"><h2>🔍 Termes de recherche Google Ads</h2><div class="loading">Chargement...</div></div><div class="section" id="niche-section"><h2>Performance par niche</h2><div class="loading">Chargement...</div></div><div class="section" id="pages-section"><h2>Pages les plus visitées</h2><div class="loading">Chargement...</div></div><div class="section" id="clicks-section"><h2>Clics CTA par position</h2><div class="loading">Chargement...</div></div></div>'}
function changePeriod(d){currentPeriod=d;fetchAllData()}

async function ga4Report(body){var res=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok){var err=await res.json();throw new Error(err.error?err.error.message:'API Error')}return res.json()}
function dateRange(){return currentPeriod==='1'?[{startDate:'today',endDate:'today'}]:[{startDate:currentPeriod+'daysAgo',endDate:'today'}]}
async function fetchAllData(){document.getElementById('refresh-info').textContent='Dernière mise à jour : '+new Date().toLocaleString('fr-FR');document.getElementById('error-box').innerHTML='';try{await Promise.all([fetchKPIs(),fetchFunnel(),fetchSearchQueries(),fetchNiches(),fetchPages(),fetchClicks()])}catch(err){document.getElementById('error-box').innerHTML='<div class="error">Erreur : '+err.message+'</div>'}}

async function fetchKPIs(){var bf=getTrafficFilter();var data=await ga4Report({dateRanges:dateRange(),dimensions:currentFilter!=='all'?[{name:currentFilter==='france'?'country':'sessionSource'}]:[],metrics:[{name:'totalUsers'},{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],...(bf?{dimensionFilter:bf}:{})});var cf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};var ctaData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cf)});var bkf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'booking_complete'}}};var bkData=await ga4Report({dateRanges:dateRange(),metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(bkf)});var row=data.rows&&data.rows[0]?data.rows[0].metricValues:[];var u=parseInt(row[0]?row[0].value:0),s=parseInt(row[1]?row[1].value:0),e=parseInt(row[3]?row[3].value:0);var cc=parseInt(ctaData.rows&&ctaData.rows[0]?ctaData.rows[0].metricValues[0].value:0);var bk=parseInt(bkData.rows&&bkData.rows[0]?bkData.rows[0].metricValues[0].value:0);var er=s>0?((e/s)*100).toFixed(1):0;var cr=u>0?((cc/u)*100).toFixed(1):0;var br=cc>0?((bk/cc)*100).toFixed(1):0;document.getElementById('kpi-row').innerHTML='<div class="kpi"><div class="kpi-label">Visiteurs</div><div class="kpi-value">'+u+'</div><div class="kpi-sub">'+s+' sessions</div></div><div class="kpi"><div class="kpi-label">Taux d\'engagement</div><div class="kpi-value '+(parseFloat(er)>50?'green':'')+'">'+er+'%</div><div class="kpi-sub">'+e+' sessions engagées</div></div><div class="kpi"><div class="kpi-label">Clics CTA</div><div class="kpi-value">'+cc+'</div><div class="kpi-sub">CTR : '+cr+'%</div></div><div class="kpi"><div class="kpi-label">Bookings Calendly</div><div class="kpi-value green">'+bk+'</div><div class="kpi-sub">Taux : '+br+'%</div></div>'}

async function fetchFunnel(){var events=['page_view','ranking_viewed','cta_click','booking_complete'];var results={};for(var i=0;i<events.length;i++){var evt=events[i];try{var ef=evt!=='page_view'?{filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:evt}}}:null;var c=mergeFilters(ef);var d=await ga4Report({dateRanges:dateRange(),metrics:[{name:evt==='page_view'?'sessions':'eventCount'}],...(c?{dimensionFilter:c}:{})});results[evt]=parseInt(d.rows&&d.rows[0]?d.rows[0].metricValues[0].value:0)}catch(e){results[evt]=0}}var t=results['page_view']||1;var steps=[{name:'Visites',count:results['page_view'],pct:100},{name:'Ranking vu',count:results['ranking_viewed'],pct:((results['ranking_viewed']/t)*100).toFixed(1)},{name:'Clic CTA',count:results['cta_click'],pct:((results['cta_click']/t)*100).toFixed(1)},{name:'Booking',count:results['booking_complete'],pct:((results['booking_complete']/t)*100).toFixed(1)}];var html='<table><tr><th>Étape</th><th>Nombre</th><th>% du total</th><th>Conversion</th><th></th></tr>';for(var i=0;i<steps.length;i++){var s=steps[i];var cr=i>0&&steps[i-1].count>0?((s.count/steps[i-1].count)*100).toFixed(1)+'%':'—';var bc=i===0?'badge-blue':parseFloat(s.pct)>10?'badge-green':parseFloat(s.pct)>0?'badge-blue':'badge-gray';html+='<tr><td><strong>'+s.name+'</strong></td><td>'+s.count+'</td><td><span class="badge '+bc+'">'+s.pct+'%</span></td><td>'+cr+'</td><td><div class="funnel-bar"><div class="funnel-fill" style="width:'+s.pct+'%"></div></div></td></tr>'}html+='</table>';document.getElementById('funnel-section').innerHTML='<h2>Funnel de conversion</h2>'+html}

async function fetchNiches(){try{var nf={filter:{fieldName:'customEvent:page_niche',stringFilter:{matchType:'FULL_REGEXP',value:'.+'}}};var d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:page_niche'}],metrics:[{name:'sessions'},{name:'eventCount'},{name:'engagedSessions'}],dimensionFilter:mergeFilters(nf)});if(!d.rows||!d.rows.length){document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2><p style="color:#888;font-size:13px">Pas encore de données.</p>';return}var html='<table><tr><th>Niche</th><th>Sessions</th><th>Events</th><th>Engagement</th></tr>';for(var i=0;i<d.rows.length;i++){var row=d.rows[i];var n=row.dimensionValues[0].value,s=parseInt(row.metricValues[0].value),e=parseInt(row.metricValues[1].value),eng=parseInt(row.metricValues[2].value);html+='<tr><td><span class="badge badge-blue">'+n+'</span></td><td>'+s+'</td><td>'+e+'</td><td>'+(s>0?((eng/s)*100).toFixed(0):0)+'%</td></tr>'}html+='</table>';document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2>'+html}catch(e){document.getElementById('niche-section').innerHTML='<h2>Performance par niche</h2><p style="color:#888;font-size:13px">Données non disponibles.</p>'}}

async function fetchPages(){var bf=getTrafficFilter();var d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'pagePath'}],metrics:[{name:'sessions'},{name:'engagedSessions'}],orderBys:[{metric:{metricName:'sessions'},desc:true}],limit:15,...(bf?{dimensionFilter:bf}:{})});if(!d.rows){document.getElementById('pages-section').innerHTML='<h2>Pages les plus visitées</h2><p style="color:#888;font-size:13px">Pas de données.</p>';return}var html='<table><tr><th>Page</th><th>Sessions</th><th>Engagées</th><th>Taux</th></tr>';for(var i=0;i<d.rows.length;i++){var row=d.rows[i];var p=row.dimensionValues[0].value,s=parseInt(row.metricValues[0].value),e=parseInt(row.metricValues[1].value);html+='<tr><td>'+p+(p.includes('comparatif')?' <span class="badge badge-green">funnel</span>':'')+'</td><td>'+s+'</td><td>'+e+'</td><td>'+(s>0?((e/s)*100).toFixed(0):0)+'%</td></tr>'}html+='</table>';document.getElementById('pages-section').innerHTML='<h2>Pages les plus visitées</h2>'+html}

async function fetchClicks(){try{var cf={filter:{fieldName:'eventName',stringFilter:{matchType:'EXACT',value:'cta_click'}}};var d=await ga4Report({dateRanges:dateRange(),dimensions:[{name:'customEvent:click_position'}],metrics:[{name:'eventCount'}],dimensionFilter:mergeFilters(cf),orderBys:[{dimension:{dimensionName:'customEvent:click_position'},desc:false}]});if(!d.rows||!d.rows.length){document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2><p style="color:#888;font-size:13px">Pas encore de clics.</p>';return}var total=0;for(var i=0;i<d.rows.length;i++)total+=parseInt(d.rows[i].metricValues[0].value);var html='<table><tr><th>Position</th><th>Clics</th><th>% du total</th><th></th></tr>';for(var i=0;i<d.rows.length;i++){var pos=d.rows[i].dimensionValues[0].value,clicks=parseInt(d.rows[i].metricValues[0].value),pct=total>0?((clicks/total)*100).toFixed(0):0;html+='<tr><td><span class="badge '+(pos==='1'?'badge-green':'badge-gray')+'">Position '+pos+'</span></td><td><strong>'+clicks+'</strong></td><td>'+pct+'%</td><td><div class="funnel-bar"><div class="funnel-fill" style="width:'+pct+'%;background:'+(pos==='1'?'#2a8c4a':'#2c6fbb')+'"></div></div></td></tr>'}html+='<tr style="font-weight:600;border-top:2px solid #ddd"><td>Total</td><td>'+total+'</td><td>100%</td><td></td></tr></table>';document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2>'+html}catch(e){document.getElementById('clicks-section').innerHTML='<h2>Clics CTA par position</h2><p style="color:#888;font-size:13px">Données non disponibles.</p>'}}
</script>
