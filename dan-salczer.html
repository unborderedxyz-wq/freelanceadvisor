.hero{background:linear-gradient(135deg,#0f1724 0%,#1a2744 100%);color:var(--white);padding:60px 24px 80px;position:relative;overflow:hidden}

.hero-text .tagline{font-size:18px;color:rgba(255,255,255,.7);margin-bottom:16px;font-weight:400}
.hero-text .value{font-size:15px;color:rgba(255,255,255,.5);line-height:1.6}
.hero-text .value strong{color:rgba(255,255,255,.9)}
.hero-cta{display:inline-block;margin-top:20px;background:var(--red);color:var(--white);padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s;border:none;cursor:pointer}

.section{max-width:800px;margin:0 auto;padding:60px 24px}

.problem{background:var(--light);padding:60px 24px}
.problem-inner{max-width:800px;margin:0 auto}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}

.problem-card .icon{font-size:28px;margin-bottom:10px}

.problem-card p{font-size:14px;color:var(--gray);margin:0;line-height:1.6}
.numbers{background:var(--dark);color:var(--white);padding:50px 24px}
.numbers-inner{max-width:800px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}
.num-item .num{font-family:'DM Serif Display',serif;font-size:36px;color:var(--red);margin-bottom:4px}
.num-item .num-label{font-size:13px;color:rgba(255,255,255,.6)}
.steps{padding:60px 24px}
.steps-inner{max-width:800px;margin:0 auto}
.steps-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;margin-top:30px}
.step{text-align:center}
.step-num{width:48px;height:48px;border-radius:50%;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;margin:0 auto 16px}
.step h3{font-size:16px;font-weight:700;margin-bottom:8px}
.step p{font-size:14px;color:var(--gray);line-height:1.6}
.testimonials{background:var(--light);padding:60px 24px}
.testimonials-inner{max-width:800px;margin:0 auto}
.quote{background:var(--white);border-radius:12px;padding:28px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.05);border-left:4px solid var(--blue)}
.quote p{font-style:italic;color:#374151;font-size:15px;line-height:1.7;margin:0}
.quote cite{display:block;font-style:normal;font-size:13px;color:var(--gray);margin-top:10px;font-weight:600}
.final-cta{text-align:center;padding:80px 24px;background:linear-gradient(135deg,#0f1724 0%,#1a2744 100%);color:var(--white)}
.final-cta h2{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px}
.final-cta p{color:rgba(255,255,255,.6);margin-bottom:24px;font-size:16px}
.final-cta .hero-cta{font-size:17px;padding:16px 40px}

.footer{text-align:center;padding:20px;font-size:11px;color:#bbb}
@media(max-width:768px){
  .hero-inner{flex-direction:column;text-align:center;gap:24px}
  .hero-photo{width:120px;height:120px}
  .hero-text h1{font-size:26px}

  .final-cta h2{font-size:26px}
  .hero{padding:40px 20px 70px}
  .hero-text .value{display:none}
  .hero-cta{width:100%;text-align:center;padding:16px 24px;font-size:16px}

</style>
